<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | K V R World</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace; /* Secret file aesthetic */
        }

        /* 1. THE K V R PORTAL (The Library visible through the hole) */
        .kvr-portal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1);
            width: 38%; /* Fits the circular opening of your Vault_door.jpg */
            height: 38%;
            background: url('assets/images/library_bg.jpg') center/cover no-repeat;
            z-index: 1;
            border-radius: 50%;
            box-shadow: inset 0 0 100px #000;
            transition: transform 2s cubic-bezier(0.7, 0, 0.3, 1), filter 1s;
        }

        /* 2. THE VAULT OVERLAY */
        .vault-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: url('assets/images/Vault_door.png') center/cover no-repeat;
            z-index: 5;
            transition: opacity 1.5s ease-in;
        }

        /* 3. INTERFACE LAYER */
        .ui-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #d4af37;
            text-align: center;
        }

        .status-text {
            font-size: 0.9rem;
            letter-spacing: 5px;
            margin-bottom: 20px;
            color: #888;
            text-transform: uppercase;
        }

        .kvr-button {
            padding: 20px 50px;
            background: transparent;
            border: 2px solid #d4af37;
            color: #d4af37;
            font-size: 1.5rem;
            letter-spacing: 10px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .kvr-button:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
        }

        /* ANIMATION CLASSES */
        .launching .kvr-portal {
            transform: translate(-50%, -50%) scale(15); /* Zooms "into" the world */
            filter: brightness(2);
        }

        .launching .vault-overlay {
            opacity: 0; /* Fades the metal away as we enter */
        }

        .launching .ui-layer {
            opacity: 0;
            transition: 0.5s;
        }
    </style>
</head>
<body>

    <div id="vault-system">
        <div class="kvr-portal"></div>
        <div class="vault-overlay"></div>

        <div class="ui-layer">
            <div class="status-text">Identity Verified: Author Tier</div>
            <button class="kvr-button" onclick="enterKVR()">ENTER K V R WORLD</button>
        </div>
    </div>

    <script>
        function enterKVR() {
            // Trigger the animation
            document.getElementById('vault-system').classList.add('launching');

            // Redirect after the zoom effect completes
            setTimeout(() => {
                window.location.href = "https://your-trilogy-link.com"; // Replace with actual KVR link
            }, 1800);
        }
    </script>

</body>
</html>
